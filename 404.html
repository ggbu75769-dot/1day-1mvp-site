<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1Day-1MVP - 페이지를 찾을 수 없습니다</title>
    <meta
      name="description"
      content="1Day-1MVP 공개 사이트의 요청한 페이지를 찾을 수 없습니다."
    />
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f4ee;
        --panel: #fffdf8;
        --ink: #17191c;
        --muted: #62666f;
        --line: #ded8ce;
        --blue: #2569c9;
        --green: #1e8b5e;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Noto Sans KR",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        display: grid;
        width: min(980px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        place-items: center;
        padding: 48px 0;
      }

      .panel {
        display: grid;
        gap: 22px;
        width: 100%;
        padding: clamp(28px, 6vw, 58px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(31, 35, 40, 0.13);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 760;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        background: var(--ink);
        color: white;
        font-size: 0.84rem;
      }

      .eyebrow {
        margin: 0;
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 780;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: 5rem;
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 700px;
        margin: 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .status-row,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 8px 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 17px;
        border: 1px solid var(--ink);
        border-radius: 8px;
        background: var(--ink);
        color: white;
        font-weight: 760;
        text-decoration: none;
      }

      .button.secondary {
        border-color: var(--line);
        background: white;
        color: var(--ink);
      }

      .language-toggle {
        display: inline-flex;
        width: max-content;
        gap: 2px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }

      .language-toggle button {
        min-width: 44px;
        min-height: 32px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .language-toggle button[aria-pressed="true"] {
        background: var(--ink);
        color: white;
      }

      .button:focus-visible,
      .language-toggle button:focus-visible {
        outline: 3px solid rgba(37, 105, 201, 0.28);
        outline-offset: 2px;
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 2.75rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="not-found-title">
        <div class="brand">
          <span class="brand-mark">1D</span>
          <span>1Day-1MVP</span>
        </div>
        <p class="eyebrow" data-i18n="eyebrow">404 / static public site</p>
        <h1 id="not-found-title" data-i18n="title">
          404 페이지를 찾을 수 없습니다.
        </h1>
        <p data-i18n="body">
          요청한 경로는 공개 소개 사이트에 없습니다. 홈으로 돌아가 실행 흐름,
          콘솔 미리보기, 파일럿 준비 상태를 확인할 수 있습니다.
        </p>
        <div class="status-row" aria-label="공개 사이트 상태">
          <span class="pill" data-i18n="pill1">정적 공개 소개 사이트</span>
          <span class="pill" data-i18n="pill2">Runtime API 비공개</span>
          <span class="pill" data-i18n="pill3">QA-Z 확인</span>
        </div>
        <div class="actions">
          <a class="button" href="./" data-i18n="home">홈으로 돌아가기</a>
          <a class="button secondary" href="./#workflow" data-i18n="workflow"
            >실행 흐름 보기</a
          >
          <a class="button secondary" href="./#readiness" data-i18n="readiness"
            >공개 상태 확인</a
          >
        </div>
        <div
          class="language-toggle"
          role="group"
          aria-label="언어 선택"
          data-i18n-aria-label="languageLabel"
        >
          <button
            type="button"
            data-language="ko"
            aria-pressed="true"
            title="한국어로 보기"
            data-i18n-title="koTitle"
          >
            한국
          </button>
          <button
            type="button"
            data-language="en"
            aria-pressed="false"
            title="영어로 보기"
            data-i18n-title="enTitle"
          >
            미국
          </button>
        </div>
      </section>
    </main>

    <script>
      const translations = {
        ko: {
          meta: {
            title: "1Day-1MVP - 페이지를 찾을 수 없습니다",
            description:
              "1Day-1MVP 공개 사이트의 요청한 페이지를 찾을 수 없습니다.",
          },
          languageLabel: "언어 선택",
          koTitle: "한국어로 보기",
          enTitle: "영어로 보기",
          eyebrow: "404 / static public site",
          title: "404 페이지를 찾을 수 없습니다.",
          body: "요청한 경로는 공개 소개 사이트에 없습니다. 홈으로 돌아가 실행 흐름, 콘솔 미리보기, 파일럿 준비 상태를 확인할 수 있습니다.",
          pill1: "정적 공개 소개 사이트",
          pill2: "Runtime API 비공개",
          pill3: "QA-Z 확인",
          home: "홈으로 돌아가기",
          workflow: "실행 흐름 보기",
          readiness: "공개 상태 확인",
        },
        en: {
          meta: {
            title: "1Day-1MVP - Page not found",
            description:
              "The requested page was not found on the 1Day-1MVP public site.",
          },
          languageLabel: "Language selection",
          koTitle: "View in Korean",
          enTitle: "View in English",
          eyebrow: "404 / static public site",
          title: "404 page not found.",
          body: "That route is not part of the public introduction site. Return home to view the workflow, console preview, and pilot readiness status.",
          pill1: "static public introduction site",
          pill2: "Runtime API private",
          pill3: "QA-Z checked",
          home: "Return home",
          workflow: "See the workflow",
          readiness: "Check launch status",
        },
      };

      function getValue(dictionary, path) {
        return path.split(".").reduce((value, key) => {
          if (value && Object.prototype.hasOwnProperty.call(value, key)) {
            return value[key];
          }
          return "";
        }, dictionary);
      }

      function setLanguage(language) {
        const selectedLanguage = translations[language] ? language : "ko";
        const dictionary = translations[selectedLanguage];
        document.documentElement.lang = selectedLanguage;
        document.title = dictionary.meta.title;
        document
          .querySelector('meta[name="description"]')
          .setAttribute("content", dictionary.meta.description);
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = getValue(dictionary, element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-title]").forEach((element) => {
          element.setAttribute(
            "title",
            getValue(dictionary, element.dataset.i18nTitle),
          );
        });
        document
          .querySelectorAll("[data-i18n-aria-label]")
          .forEach((element) => {
            element.setAttribute(
              "aria-label",
              getValue(dictionary, element.dataset.i18nAriaLabel),
            );
          });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.language === selectedLanguage),
          );
        });
        try {
          localStorage.setItem("1day-1mvp-language", selectedLanguage);
        } catch {
          return;
        }
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () =>
          setLanguage(button.dataset.language),
        );
      });

      let initialLanguage = "ko";
      try {
        initialLanguage = localStorage.getItem("1day-1mvp-language") || "ko";
      } catch {
        initialLanguage = "ko";
      }
      setLanguage(initialLanguage);
    </script>
  </body>
</html>
