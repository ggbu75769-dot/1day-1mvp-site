<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="1Day-1MVP 공개 소개 사이트에서 요청한 페이지를 찾을 수 없습니다."
    />
    <title>1Day-1MVP - 페이지를 찾을 수 없습니다</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f6f8f5;
        --surface: #ffffff;
        --ink: #141a22;
        --muted: #5c6773;
        --line: #d8e0dc;
        --blue: #245fb8;
        --green: #1f7a55;
        --green-soft: #eaf7f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 88px 0 56px;
      }

      .language-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        min-width: 132px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
      }

      .language-switcher button {
        min-height: 34px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 850;
      }

      .language-switcher button[aria-pressed="true"] {
        background: var(--ink);
        color: white;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid #78a9ff;
        outline-offset: 3px;
      }

      .kicker {
        margin: 0 0 12px;
        color: var(--blue);
        font-size: 0.9rem;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 7vw, 4.2rem);
        line-height: 1.04;
        letter-spacing: 0;
        word-break: keep-all;
      }

      p {
        max-width: 650px;
        color: var(--muted);
        font-size: 1.04rem;
        line-height: 1.65;
        word-break: keep-all;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 28px;
      }

      .link-card {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--ink);
        color: white;
        font-weight: 850;
        text-decoration: none;
      }

      .link-card.secondary {
        background: transparent;
        color: var(--ink);
      }

      .note {
        margin-top: 28px;
        border-left: 4px solid var(--green);
        border-radius: 8px;
        padding: 14px 16px;
        background: var(--green-soft);
        color: #24523d;
      }

      @media (max-width: 560px) {
        .language-switcher {
          left: 16px;
          right: 16px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div
        class="language-switcher"
        role="group"
        aria-label="언어 선택"
        data-i18n-aria-label="languageLabel"
      >
        <button
          type="button"
          data-language="ko"
          aria-pressed="true"
          title="한국어로 보기"
          data-i18n-title="koTitle"
        >
          한국
        </button>
        <button
          type="button"
          data-language="en"
          aria-pressed="false"
          title="영어로 보기"
          data-i18n-title="enTitle"
        >
          미국
        </button>
      </div>
      <p class="kicker">1Day-1MVP</p>
      <h1 data-i18n="title">페이지를 찾을 수 없습니다.</h1>
      <p data-i18n="body">
        주소가 바뀌었거나, 아직 공개하지 않은 페이지일 수 있습니다.
      </p>
      <div
        class="links"
        aria-label="이동 링크"
        data-i18n-aria-label="linksLabel"
      >
        <a class="link-card" href="./" data-i18n="homeLink">홈으로 돌아가기</a>
        <a
          class="link-card secondary"
          href="./#workflow"
          data-i18n="workflowLink"
          >운영 흐름 보기</a
        >
        <a class="link-card secondary" href="./#status" data-i18n="statusLink"
          >출시 상태 보기</a
        >
      </div>
      <p class="note" data-i18n="note">
        이 사이트는 정적 소개 페이지입니다. 실제 관리 콘솔과 Runtime API는
        비공개 환경에서 검증됩니다.
      </p>
    </main>

    <script>
      const translations = {
        ko: {
          meta: {
            title: "1Day-1MVP - 페이지를 찾을 수 없습니다",
            description:
              "1Day-1MVP 공개 소개 사이트에서 요청한 페이지를 찾을 수 없습니다.",
          },
          languageLabel: "언어 선택",
          linksLabel: "이동 링크",
          koTitle: "한국어로 보기",
          enTitle: "영어로 보기",
          title: "페이지를 찾을 수 없습니다.",
          body: "주소가 바뀌었거나, 아직 공개하지 않은 페이지일 수 있습니다.",
          homeLink: "홈으로 돌아가기",
          workflowLink: "운영 흐름 보기",
          statusLink: "출시 상태 보기",
          note: "이 사이트는 정적 소개 페이지입니다. 실제 관리 콘솔과 Runtime API는 비공개 환경에서 검증됩니다.",
        },
        en: {
          meta: {
            title: "1Day-1MVP - Page not found",
            description:
              "The requested page was not found on the 1Day-1MVP public landing site.",
          },
          languageLabel: "Language selection",
          linksLabel: "Navigation links",
          koTitle: "View in Korean",
          enTitle: "View in English",
          title: "We couldn’t find that page.",
          body: "The address may have changed, or the page may not be public yet.",
          homeLink: "Return home",
          workflowLink: "View the operating flow",
          statusLink: "View launch status",
          note: "This is a static landing site. The private management console and Runtime API are validated in a controlled environment.",
        },
      };

      function getValue(dictionary, path) {
        return path.split(".").reduce((value, key) => {
          if (value && Object.prototype.hasOwnProperty.call(value, key)) {
            return value[key];
          }
          return "";
        }, dictionary);
      }

      function getStoredLanguage() {
        try {
          return localStorage.getItem("1day-1mvp-language");
        } catch {
          return null;
        }
      }

      function storeLanguage(language) {
        try {
          localStorage.setItem("1day-1mvp-language", language);
        } catch {
          return;
        }
      }

      function setLanguage(language) {
        const selectedLanguage = translations[language] ? language : "ko";
        const dictionary = translations[selectedLanguage];
        document.documentElement.lang = selectedLanguage === "ko" ? "ko" : "en";
        document.title = dictionary.meta.title;
        document
          .querySelector('meta[name="description"]')
          .setAttribute("content", dictionary.meta.description);
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = getValue(dictionary, element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-title]").forEach((element) => {
          element.setAttribute(
            "title",
            getValue(dictionary, element.dataset.i18nTitle),
          );
        });
        document
          .querySelectorAll("[data-i18n-aria-label]")
          .forEach((element) => {
            element.setAttribute(
              "aria-label",
              getValue(dictionary, element.dataset.i18nAriaLabel),
            );
          });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.language === selectedLanguage),
          );
        });
        storeLanguage(selectedLanguage);
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () =>
          setLanguage(button.dataset.language),
        );
      });

      setLanguage(getStoredLanguage() || "ko");
    </script>
  </body>
</html>
