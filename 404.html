<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="요청한 1Day-1MVP 정적 페이지를 찾을 수 없습니다."
    />
    <title>1Day-1MVP - 페이지를 찾을 수 없습니다</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8faf7;
        --panel: #ffffff;
        --ink: #17212b;
        --muted: #596671;
        --line: #d8e1dc;
        --blue: #245fb8;
        --green: #1f7a55;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 88px 0 56px;
      }

      .language-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        min-width: 132px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
      }

      .language-switcher button {
        min-height: 34px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .language-switcher button[aria-pressed="true"] {
        background: var(--ink);
        color: white;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid #78a9ff;
        outline-offset: 3px;
      }

      .kicker {
        margin: 0 0 12px;
        color: var(--blue);
        font-size: 0.9rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 7vw, 4.2rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      p {
        max-width: 650px;
        color: var(--muted);
        font-size: 1.04rem;
        line-height: 1.65;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 28px;
      }

      .link-card {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--ink);
        color: white;
        font-weight: 800;
        text-decoration: none;
      }

      .link-card.secondary {
        background: transparent;
        color: var(--ink);
      }

      .note {
        margin-top: 28px;
        border-left: 4px solid var(--green);
        border-radius: 8px;
        padding: 14px 16px;
        background: #edf8f2;
        color: #24523d;
      }

      @media (max-width: 560px) {
        .language-switcher {
          left: 16px;
          right: 16px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div
        class="language-switcher"
        role="group"
        aria-label="언어 선택"
        data-i18n-aria-label="languageLabel"
      >
        <button
          type="button"
          data-language="ko"
          aria-pressed="true"
          title="한국어로 보기"
          data-i18n-title="koTitle"
        >
          한국
        </button>
        <button
          type="button"
          data-language="en"
          aria-pressed="false"
          title="영어로 보기"
          data-i18n-title="enTitle"
        >
          미국
        </button>
      </div>
      <p class="kicker">1Day-1MVP</p>
      <h1 data-i18n="title">페이지를 찾을 수 없습니다</h1>
      <p data-i18n="body">
        이 공개 GitHub Pages 사이트는 1Day-1MVP 제품 로직과 출시 상태를 설명하는
        정적 페이지입니다. 백엔드나 runtime-api 경로는 여기에서 제공하지
        않습니다.
      </p>
      <div
        class="links"
        aria-label="복구 링크"
        data-i18n-aria-label="linksLabel"
      >
        <a class="link-card" href="./" data-i18n="homeLink">홈페이지</a>
        <a
          class="link-card secondary"
          href="./#launch-status"
          data-i18n="statusLink"
          >출시 상태</a
        >
        <a
          class="link-card secondary"
          href="./#operating-logic"
          data-i18n="logicLink"
          >운영 로직</a
        >
      </div>
      <p class="note" data-i18n="note">
        소스 공개 릴리스와 LICENSE 생성은 인간 승인 전까지 대기 상태입니다.
      </p>
    </main>

    <script>
      const translations = {
        ko: {
          meta: {
            title: "1Day-1MVP - 페이지를 찾을 수 없습니다",
            description: "요청한 1Day-1MVP 정적 페이지를 찾을 수 없습니다.",
          },
          languageLabel: "언어 선택",
          linksLabel: "복구 링크",
          koTitle: "한국어로 보기",
          enTitle: "영어로 보기",
          title: "페이지를 찾을 수 없습니다",
          body: "이 공개 GitHub Pages 사이트는 1Day-1MVP 제품 로직과 출시 상태를 설명하는 정적 페이지입니다. 백엔드나 runtime-api 경로는 여기에서 제공하지 않습니다.",
          homeLink: "홈페이지",
          statusLink: "출시 상태",
          logicLink: "운영 로직",
          note: "소스 공개 릴리스와 LICENSE 생성은 인간 승인 전까지 대기 상태입니다.",
        },
        en: {
          meta: {
            title: "1Day-1MVP - Page Not Found",
            description: "The requested 1Day-1MVP static page was not found.",
          },
          languageLabel: "Language selection",
          linksLabel: "Recovery links",
          koTitle: "View in Korean",
          enTitle: "View in English",
          title: "Page Not Found",
          body: "This public GitHub Pages site is a static page explaining 1Day-1MVP product logic and launch status. Backend and runtime-api routes are not provided here.",
          homeLink: "Homepage",
          statusLink: "Launch Status",
          logicLink: "Operating Logic",
          note: "Public source release and LICENSE creation remain pending until human approval.",
        },
      };

      function getValue(dictionary, path) {
        return path.split(".").reduce((value, key) => {
          if (value && Object.prototype.hasOwnProperty.call(value, key)) {
            return value[key];
          }
          return "";
        }, dictionary);
      }

      function getStoredLanguage() {
        try {
          return localStorage.getItem("1day-1mvp-language");
        } catch {
          return null;
        }
      }

      function storeLanguage(language) {
        try {
          localStorage.setItem("1day-1mvp-language", language);
        } catch {
          return;
        }
      }

      function setLanguage(language) {
        const selectedLanguage = translations[language] ? language : "ko";
        const dictionary = translations[selectedLanguage];
        document.documentElement.lang = selectedLanguage === "ko" ? "ko" : "en";
        document.title = dictionary.meta.title;
        document
          .querySelector('meta[name="description"]')
          .setAttribute("content", dictionary.meta.description);
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = getValue(dictionary, element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-title]").forEach((element) => {
          element.setAttribute(
            "title",
            getValue(dictionary, element.dataset.i18nTitle),
          );
        });
        document
          .querySelectorAll("[data-i18n-aria-label]")
          .forEach((element) => {
            element.setAttribute(
              "aria-label",
              getValue(dictionary, element.dataset.i18nAriaLabel),
            );
          });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.language === selectedLanguage),
          );
        });
        storeLanguage(selectedLanguage);
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () =>
          setLanguage(button.dataset.language),
        );
      });

      setLanguage(getStoredLanguage() || "ko");
    </script>
  </body>
</html>
