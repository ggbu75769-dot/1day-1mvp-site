<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="1Day-1MVP 공개 소개 사이트에서 요청한 페이지를 찾을 수 없습니다."
    />
    <title>1Day-1MVP - 404 페이지를 찾을 수 없습니다</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f5f7f3;
        --surface: #ffffff;
        --ink: #10151d;
        --muted: #5b6673;
        --line: #d8dfd7;
        --blue: #245fb8;
        --blue-soft: #e8f0ff;
        --green: #16825b;
        --green-soft: #e5f5ee;
        --amber: #b26f14;
        --amber-soft: #fff1d7;
        --shadow: 0 24px 70px rgba(16, 21, 29, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
        line-height: 1.62;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid #82afff;
        outline-offset: 3px;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        padding: 88px 0 56px;
      }

      .language-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        min-width: 136px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
      }

      .language-switcher button {
        min-height: 34px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 850;
      }

      .language-switcher button[aria-pressed="true"] {
        background: var(--ink);
        color: #ffffff;
      }

      .panel {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .panel-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: #f1f5f1;
      }

      .panel-header strong {
        font-size: 0.96rem;
      }

      .badge {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        background: var(--amber-soft);
        color: var(--amber);
        font-size: 0.82rem;
        font-weight: 900;
      }

      .panel-body {
        display: grid;
        gap: 20px;
        padding: 30px;
      }

      .kicker {
        margin: 0;
        color: var(--blue);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: 3.35rem;
        line-height: 1.05;
        letter-spacing: 0;
        word-break: keep-all;
      }

      p {
        max-width: 710px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        word-break: keep-all;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .link-card {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--ink);
        color: #ffffff;
        font-weight: 850;
        text-decoration: none;
      }

      .link-card.secondary {
        background: transparent;
        color: var(--ink);
      }

      .status-note {
        border: 1px solid #bfe3d1;
        border-radius: 8px;
        padding: 14px 16px;
        background: var(--green-soft);
        color: #24523d;
      }

      @media (max-width: 620px) {
        .language-switcher {
          left: 16px;
          right: 16px;
          width: auto;
        }

        main {
          padding-top: 104px;
        }

        .panel-body {
          padding: 22px;
        }

        h1 {
          font-size: 2.35rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div
        class="language-switcher"
        role="group"
        aria-label="언어 선택"
        data-i18n-aria-label="languageLabel"
      >
        <button
          type="button"
          data-language="ko"
          aria-pressed="true"
          title="한국어로 보기"
          data-i18n-title="koTitle"
        >
          한국
        </button>
        <button
          type="button"
          data-language="en"
          aria-pressed="false"
          title="영어로 보기"
          data-i18n-title="enTitle"
        >
          미국
        </button>
      </div>

      <section class="panel" aria-labelledby="not-found-title">
        <div class="panel-header">
          <strong>1Day-1MVP</strong>
          <span class="badge" data-i18n="badge">404 route check</span>
        </div>
        <div class="panel-body">
          <p class="kicker" data-i18n="kicker">Page not found</p>
          <h1 id="not-found-title" data-i18n="title">
            404 페이지를 찾을 수 없습니다.
          </h1>
          <p data-i18n="body">
            주소가 바뀌었거나 아직 공개하지 않은 페이지일 수 있습니다. 공개 소개
            사이트의 흐름과 현재 상태로 돌아갈 수 있습니다.
          </p>
          <div
            class="links"
            aria-label="이동 링크"
            data-i18n-aria-label="linksLabel"
          >
            <a class="link-card" href="./" data-i18n="homeLink"
              >홈으로 돌아가기</a
            >
            <a
              class="link-card secondary"
              href="./#workflow"
              data-i18n="workflowLink"
              >실행 흐름 보기</a
            >
            <a
              class="link-card secondary"
              href="./#status"
              data-i18n="statusLink"
              >공개 상태 확인</a
            >
          </div>
          <p class="status-note" data-i18n="note">
            이 페이지는 정적 공개 소개 사이트입니다. 실제 관리 콘솔과 Runtime
            API는 비공개 환경에서 검증됩니다.
          </p>
        </div>
      </section>
    </main>

    <script>
      const translations = {
        ko: {
          meta: {
            title: "1Day-1MVP - 404 페이지를 찾을 수 없습니다",
            description:
              "1Day-1MVP 공개 소개 사이트에서 요청한 페이지를 찾을 수 없습니다.",
          },
          languageLabel: "언어 선택",
          linksLabel: "이동 링크",
          koTitle: "한국어로 보기",
          enTitle: "영어로 보기",
          badge: "404 route check",
          kicker: "Page not found",
          title: "404 페이지를 찾을 수 없습니다.",
          body: "주소가 바뀌었거나 아직 공개하지 않은 페이지일 수 있습니다. 공개 소개 사이트의 흐름과 현재 상태로 돌아갈 수 있습니다.",
          homeLink: "홈으로 돌아가기",
          workflowLink: "실행 흐름 보기",
          statusLink: "공개 상태 확인",
          note: "이 페이지는 정적 공개 소개 사이트입니다. 실제 관리 콘솔과 Runtime API는 비공개 환경에서 검증됩니다.",
        },
        en: {
          meta: {
            title: "1Day-1MVP - 404 page not found",
            description:
              "The requested page was not found on the 1Day-1MVP public introduction site.",
          },
          languageLabel: "Language selection",
          linksLabel: "Navigation links",
          koTitle: "View in Korean",
          enTitle: "View in English",
          badge: "404 route check",
          kicker: "Page not found",
          title: "404 page not found.",
          body: "The address may have changed, or the page may not be public yet. You can return to the public workflow and current status.",
          homeLink: "Return home",
          workflowLink: "See the workflow",
          statusLink: "Check launch status",
          note: "This is a static public introduction site. The real management console and Runtime API are verified in a private environment.",
        },
      };

      function getValue(dictionary, path) {
        return path.split(".").reduce((value, key) => {
          if (value && Object.prototype.hasOwnProperty.call(value, key)) {
            return value[key];
          }
          return "";
        }, dictionary);
      }

      function getStoredLanguage() {
        try {
          return localStorage.getItem("1day-1mvp-language");
        } catch {
          return null;
        }
      }

      function storeLanguage(language) {
        try {
          localStorage.setItem("1day-1mvp-language", language);
        } catch {
          return;
        }
      }

      function setLanguage(language) {
        const selectedLanguage = translations[language] ? language : "ko";
        const dictionary = translations[selectedLanguage];
        document.documentElement.lang = selectedLanguage === "ko" ? "ko" : "en";
        document.title = dictionary.meta.title;
        document
          .querySelector('meta[name="description"]')
          .setAttribute("content", dictionary.meta.description);
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = getValue(dictionary, element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-title]").forEach((element) => {
          element.setAttribute(
            "title",
            getValue(dictionary, element.dataset.i18nTitle),
          );
        });
        document
          .querySelectorAll("[data-i18n-aria-label]")
          .forEach((element) => {
            element.setAttribute(
              "aria-label",
              getValue(dictionary, element.dataset.i18nAriaLabel),
            );
          });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.language === selectedLanguage),
          );
        });
        storeLanguage(selectedLanguage);
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () =>
          setLanguage(button.dataset.language),
        );
      });

      setLanguage(getStoredLanguage() || "ko");
    </script>
  </body>
</html>
